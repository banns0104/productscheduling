    function _startFirebaseSync() {
      // 연결 상태 모니터
      _fb.db.ref('.info/connected').on('value', function(snap) {
        if (snap.val() === true) {
          _updateSync('실시간 동기화', '#dcfce7', '#16a34a');
        } else {
          _updateSync('연결 중...', '#fef3c7', '#d97706');
        }
      });

      // 실시간 리스너 — 다른 사용자가 수정하면 반영
      _fb.ref.on('value', function(snapshot) {
        var data = snapshot.val();
        if (_fb.skipNext) { _fb.skipNext = false; return; }

        if (data) {
          // Firebase에 데이터 있음 → 반영
          var arr = Object.values(data).sort(function(a, b) {
            return parseInt(a.id.replace('P', '')) - parseInt(b.id.replace('P', ''));
          });
          // 안전장치: Firebase 데이터가 비어있으면 무시
          if (arr.length > 0) {
            state.projects = arr;
            localStorage.setItem('af_projects', JSON.stringify(arr));
            _updateSync('실시간 동기화', '#dcfce7', '#16a34a');
            // 화면 새로고침
            if (state.currentTab === 'schedule') renderGantt();
            else if (state.currentTab === 'projects') renderProjects();
            else if (state.currentTab === 'team') renderTeam();
            else if (state.currentTab === 'overview') renderOverview();
            else if (state.currentTab === 'history') renderHistory();
          }
        } else {
          // Firebase가 비어있으면 → 현재 로컬 데이터를 업로드
          if (state.projects.length > 0) {
            var obj = {};
            state.projects.forEach(function(p) { obj[p.id] = p; });
            _fb.skipNext = true;
            _fb.ref.set(obj);
          }
          _updateSync('실시간 동기화', '#dcfce7', '#16a34a');
        }
      }, function(error) {
        console.error('Firebase read fail:', error);
        _updateSync('연결 실패', '#fee2e2', '#dc2626');
        // 에러 나도 로컬 데이터는 그대로 — 아무것도 안 건드림
      });
    }

    /* ========== GANTT CALCULATIONS ========== */
    function renderGantt() {
      // 성능 가드: 스케줄 탭이 아니면 스킵
      if (state.currentTab !== 'schedule') return;

      // Recalculate gantt range dynamically
      recalcGanttRange();

      const namesScroll = document.getElementById('namesScroll');
      const ganttBars = document.getElementById('ganttBars');
      const ganttHeader = document.getElementById('ganttHeader');

      namesScroll.innerHTML = '';
      ganttBars.innerHTML = '';
      ganttHeader.innerHTML = '';

      const dayW = DAY_WIDTH * state.zoom;

      // ===== 2-row header: months + days =====
      let monthsHTML = '';
      let daysHTML = '';
      let currentMonth = new Date(GANTT_START);

      while (currentMonth <= GANTT_END) {
        const year = currentMonth.getFullYear();
        const month = currentMonth.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        // 이 달에서 실제로 표시할 일 수 계산
        const firstDay = (currentMonth < GANTT_START) ? GANTT_START.getDate() : 1;
        const monthWidth = daysInMonth * dayW;
        const monthName = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'][month];
        monthsHTML += '<div class="month-header" style="width:' + monthWidth + 'px;">' + monthName + '</div>';

        // 일별 셀
        for (let d = 1; d <= daysInMonth; d++) {
          const dt = new Date(year, month, d);
          const dow = dt.getDay(); // 0=Sun
          const isWeekend = dow === 0 || dow === 6;
          const isMonday = dow === 1;
          const isToday = dt.getFullYear() === TODAY.getFullYear() && dt.getMonth() === TODAY.getMonth() && dt.getDate() === TODAY.getDate();
          let cls = 'day-cell';
          if (isMonday) cls += ' week-start';
          if (isWeekend) cls += ' weekend';
          if (isToday) cls += ' is-today';

          // 모든 날짜 항상 표시
          let label = d;

          daysHTML += '<div class="' + cls + '" style="width:' + dayW + 'px;">' + label + '</div>';
        }
        currentMonth = new Date(year, month + 1, 1);
      }
      const totalWidth = TOTAL_DAYS * dayW;
      const showDays = state.zoom >= 1;
      ganttHeader.innerHTML = '<div class="gantt-header-months" style="min-width:' + totalWidth + 'px;">' + monthsHTML + '</div>' +
        (showDays ? '<div class="gantt-header-days" style="min-width:' + totalWidth + 'px;">' + daysHTML + '</div>' : '');

      // ===== Grid lines (세로 줄) =====
      let existingGrid = document.getElementById('ganttGridLines');
      if (existingGrid) existingGrid.remove();
      const gridContainer = document.createElement('div');
      gridContainer.id = 'ganttGridLines';
      gridContainer.className = 'gantt-grid-lines';

      // totalWidth already defined above
      let curDate = new Date(GANTT_START);
      for (let i = 0; i <= TOTAL_DAYS; i++) {
        const x = i * dayW;
        const dow = curDate.getDay();
        const isFirstOfMonth = curDate.getDate() === 1;
        const isMonday = dow === 1;
        const isSat = dow === 6;

        // 주말 음영 (토~일 2일분)
        if (isSat) {
          const shade = document.createElement('div');
          shade.style.cssText = 'position:absolute;top:0;bottom:0;background:rgba(0,0,0,0.03);pointer-events:none;z-index:0;';
          shade.style.left = x + 'px';
          shade.style.width = (dayW * 2) + 'px';
          gridContainer.appendChild(shade);
        }

        // 월 경계선
        if (isFirstOfMonth && i > 0) {
          const line = document.createElement('div');
          line.className = 'grid-line month';
          line.style.left = x + 'px';
          gridContainer.appendChild(line);
        }
        // 주 경계선 (월요일)
        else if (isMonday) {
          const line = document.createElement('div');
          line.className = 'grid-line week';
          line.style.left = x + 'px';
          gridContainer.appendChild(line);
        }
        // 일반 일 경계선 — 항상 표시
        else {
          const line = document.createElement('div');
          line.className = 'grid-line day';
          line.style.left = x + 'px';
          gridContainer.appendChild(line);
        }

        curDate = new Date(curDate.getFullYear(), curDate.getMonth(), curDate.getDate() + 1);
      }

      const barsContainer = document.getElementById('barsContainer');
      barsContainer.insertBefore(gridContainer, barsContainer.firstChild);

      // Calculate today line position
      const todayDays = daysSinceStart(TODAY);
      const todayX = todayDays * DAY_WIDTH * state.zoom;
      const todayLine = document.getElementById('todayLine');
      todayLine.style.left = todayX + 'px';

      // Add hard deadline marker for P01
      const p01 = state.projects.find(p => p.id === 'P01');
      if (p01 && p01.hardDeadline) {
        const deadlineDate = parseLocalDate(p01.hardDeadline);
        const deadlineDays = daysSinceStart(deadlineDate);
        const deadlineX = deadlineDays * DAY_WIDTH * state.zoom;
        if (!document.getElementById('hardDeadlineLine')) {
          const line = document.createElement('div');
          line.id = 'hardDeadlineLine';
          line.style.position = 'absolute';
          line.style.width = '2px';
          line.style.background = '#dc2626';
          line.style.top = '0';
          line.style.bottom = '0';
          line.style.zIndex = '9';
          line.style.pointerEvents = 'none';
          line.style.opacity = '0.6';
          line.style.borderLeft = '2px dashed #dc2626';
          document.getElementById('ganttBars').appendChild(line);
        }
        const deadlineLine = document.getElementById('hardDeadlineLine');
        deadlineLine.style.left = deadlineX + 'px';
      }

      // Group projects by tier or member
      const filtered = filterProjects();
      if (state.view === 'project') {
        renderProjectView(filtered, namesScroll, ganttBars);
        // 의존성은 프로젝트 이름 옆 아이콘+툴팁으로 표시 (점선 화살표 제거)
      } else {
        renderMemberView(filtered, namesScroll, ganttBars);
      }
    }

    function renderDependencyLines(projects, container) {
      let existingSvg = document.getElementById('depArrowsSvg');
      if (existingSvg) existingSvg.remove();

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.id = 'depArrowsSvg';
      svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;overflow:visible;';
      const dayW = DAY_WIDTH * state.zoom;

      projects.forEach(proj => {
        if (!proj.deps || proj.deps.length === 0) return;
        let targetStart = null;
        ['plan','design','front','back','qa'].forEach(ph => {
          if (!targetStart && proj.phases[ph] && proj.phases[ph].start) {
            targetStart = parseLocalDate(proj.phases[ph].start);
          }
        });
        if (!targetStart) return;

        const targetRow = document.getElementById('row-' + proj.id);
        if (!targetRow) return;
        const targetY = targetRow.offsetTop + 18;
        const targetX = daysSinceStart(targetStart) * dayW;

        proj.deps.forEach(depId => {
          const depProj = state.projects.find(p => p.id === depId);
          if (!depProj) return;
          let sourceEnd = null;
          ['qa','back','front','design','plan'].forEach(ph => {
            if (!sourceEnd && depProj.phases[ph] && depProj.phases[ph].end) {
              sourceEnd = parseLocalDate(depProj.phases[ph].end);
            }
          });
          if (!sourceEnd) return;

          const sourceRow = document.getElementById('row-' + depId);
          if (!sourceRow) return;
          const sourceY = sourceRow.offsetTop + 18;
          const sourceX = (daysSinceStart(sourceEnd) + 1) * dayW;

          const midX = (sourceX + targetX) / 2;
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', 'M' + sourceX + ',' + sourceY + ' C' + midX + ',' + sourceY + ' ' + midX + ',' + targetY + ' ' + targetX + ',' + targetY);
          path.setAttribute('class', 'dep-arrow');
          svg.appendChild(path);

          const head = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
          head.setAttribute('points', (targetX - 6) + ',' + (targetY - 4) + ' ' + targetX + ',' + targetY + ' ' + (targetX - 6) + ',' + (targetY + 4));
          head.setAttribute('class', 'dep-arrow-head');
          svg.appendChild(head);
        });
      });

      const gridContainer = document.getElementById('ganttGridLines');
      if (gridContainer && gridContainer.parentNode) {
        gridContainer.parentNode.insertBefore(svg, gridContainer.nextSibling);
      } else {
        container.insertBefore(svg, container.firstChild);
      }
    }

        if (grouped[p.tier]) grouped[p.tier].push(p);

      let rowIdx = 0;
      tierOrder.forEach(tier => {
        const projects = grouped[tier];
        if (projects.length === 0) return;

        // Tier header — use createElement to avoid innerHTML += destroying event handlers
        const tierColor = TIER_COLORS[tier] || '#6b7280';
        const tierNameRow = document.createElement('div');
        tierNameRow.className = 'name-row tier-header';
        tierNameRow.style.color = tierColor;
        tierNameRow.textContent = tier === 'CONTINUOUS' ? '지속 병행' : tier;

          const nameRow = document.createElement('div');

          topLine.onclick = function() { openDetailPanel(project.id); };
          topLine.style.cursor = 'pointer';

            project.serviceTypes.forEach(function(st) {

            });

          bottomLine.innerHTML = svcTagsHTML + '<span>' + startStr + ' ~ ' + endStr + '</span>' + (deployStr ? '<span style="color:#f97316;font-weight:600;" title="배포일">🚀' + deployStr + '</span>' : '');

          chatBtn.onclick = function(e) {
            e.stopPropagation();
            document.getElementById('chatPanel').classList.add('open');
            switchChatTab('project');
            var sel = document.getElementById('projectChatSelect');
            sel.value = project.id;
            switchProject(project.id);
            clearChatBadge();
          };
          bottomLine.appendChild(chatBtn);

          nameRow.appendChild(topLine);
          nameRow.appendChild(bottomLine);
          namesScroll.appendChild(nameRow);

          const row = document.createElement('div');
          row.className = 'bar-row' + (rowIdx % 2 === 1 ? ' row-even' : '');

          ['plan', 'design', 'front', 'back', 'qa'].forEach(phase => {

              const start = parseLocalDate(phaseData.start);
              const end = parseLocalDate(phaseData.end);
              const left = daysSinceStart(start) * DAY_WIDTH * state.zoom;
              const width = durationDays(start, end) * DAY_WIDTH * state.zoom;
              const assignees = project.assignments[phase] || [];
              const assigneeStr = assignees.slice(0, 2).map(getInitials).join('/');

              const bar = document.createElement('div');
              bar.className = `gantt-bar phase-${phase}`;
              bar.style.left = left + 'px';
              bar.style.width = Math.max(width, 20) + 'px';

              // 진행률 바
              const stripe = document.createElement('div');
              stripe.className = 'progress-stripe status-' + project.status;
              bar.appendChild(stripe);

              // 리본 뱃지 + 담당자 이름
              const ribbon = document.createElement('span');
              ribbon.className = 'phase-ribbon';
              ribbon.textContent = PHASE_SHORT[phase];

          // 빈 영역 클릭 시 인라인 스케줄 등록
          row.addEventListener('click', function(ev) {

            const clickDay = Math.floor(x / (DAY_WIDTH * state.zoom));

            clickDate.setDate(clickDate.getDate() + clickDay);
            openInlineSchedule(project.id, clickDate, event);

          // Add deploy date marker
          if (project.deployDate && project.deployDate !== '' && project.deployDate !== '지속' && project.deployDate !== '지속 병행') {

            if (deployDate) {
              const deployLeft = daysSinceStart(deployDate) * DAY_WIDTH * state.zoom;
              const deployMarker = document.createElement('div');
              deployMarker.className = 'deploy-marker';
              deployMarker.style.left = deployLeft + 'px';
              deployMarker.title = '배포: ' + project.deployDate;

      // Add + row
      const addNameRow = document.createElement('div');
      addNameRow.className = 'name-row add-row';
      addNameRow.textContent = '+ 새 안건 추가';

      namesScroll.appendChild(addNameRow);

      const addBarRow = document.createElement('div');
      addBarRow.className = 'bar-row add-row';
      ganttBars.appendChild(addBarRow);

    function renderMemberView(projects, namesScroll, ganttBars) {
      const memberMap = {};
      TEAM.forEach(m => memberMap[m.id] = { member: m, phases: [] });

      projects.forEach(proj => {
        ['plan', 'design', 'front', 'back', 'qa'].forEach(phase => {
          const phaseData = proj.phases[phase];
          if (phaseData && phaseData.start && phaseData.end) {
            (proj.assignments[phase] || []).forEach(memberId => {
              if (memberMap[memberId]) {
                memberMap[memberId].phases.push({
                  project: proj, phase,
                  start: parseLocalDate(phaseData.start),
                  end: parseLocalDate(phaseData.end)
                });
              }
            });
          }
        });
      });

      TEAM.forEach(member => {
        const data = memberMap[member.id];
        // 겹치는 바를 여러 줄로 분리
        const lanes = [];
        const sorted = data.phases.sort((a, b) => a.start - b.start);
        sorted.forEach(item => {
          let placed = false;
          for (let i = 0; i < lanes.length; i++) {
            const lastEnd = lanes[i][lanes[i].length - 1].end;
            if (item.start >= lastEnd) {
              lanes[i].push(item);
              placed = true;
              break;
            }
          }
          if (!placed) lanes.push([item]);
        });

        const rowCount = Math.max(lanes.length, 1);

        // 멤버 이름 (멀티 row 높이 반영)
        const nameRow = document.createElement('div');
        nameRow.className = 'name-row';
        nameRow.style.minHeight = (rowCount * 30 + 6) + 'px';
        nameRow.innerHTML = '<div><strong>' + member.name + '</strong><div style="font-size:10px;color:#9ca3af;">' + member.role + '</div></div>';
        namesScroll.appendChild(nameRow);

        const row = document.createElement('div');
        row.className = 'bar-row';
        row.style.height = (rowCount * 30 + 6) + 'px';

        lanes.forEach((lane, laneIdx) => {
          lane.forEach(item => {
            const left = daysSinceStart(item.start) * DAY_WIDTH * state.zoom;
            const width = durationDays(item.start, item.end) * DAY_WIDTH * state.zoom;
            const topPos = 3 + laneIdx * 30;

            const bar = document.createElement('div');
            bar.className = 'gantt-bar phase-' + item.phase;
            bar.style.left = left + 'px';
            bar.style.width = Math.max(width, 20) + 'px';
            bar.style.top = topPos + 'px';
            bar.style.height = '24px';
            // 리본 + 프로젝트명
            const mRibbon = document.createElement('span');
            mRibbon.className = 'phase-ribbon';
            mRibbon.textContent = PHASE_SHORT[item.phase];
            bar.appendChild(mRibbon);
            const mLabel = document.createElement('span');
            mLabel.className = 'bar-members';
            mLabel.textContent = item.project.name;
            bar.appendChild(mLabel);

            // 툴팁 데이터
            bar.setAttribute('data-tooltip', item.project.name + ' - ' + PHASE_LABELS[item.phase] + '\n' + item.project.phases[item.phase].start + ' ~ ' + item.project.phases[item.phase].end);

            // 리소스 충돌 체크
            const hasConflict = sorted.some(other =>
              other !== item && other.start < item.end && other.end > item.start
            );
            if (hasConflict) {
              bar.style.border = '2px solid #ef4444';
              bar.style.boxShadow = '0 0 4px rgba(239,68,68,0.3)';
            }

            bar.onmousedown = (e) => { e.preventDefault(); startDrag(e, item.project.id, item.phase); };
            bar.ontouchstart = (e) => { startDrag(e, item.project.id, item.phase); };
            row.appendChild(bar);
          });
        });

        ganttBars.appendChild(row);
      });
    }

    function filterProjects() {
      return state.projects.filter(p => {
        if (state.filters.search && !p.name.includes(state.filters.search) && !p.id.includes(state.filters.search)) return false;
        if (state.filters.tier && p.tier !== state.filters.tier) return false;
        if (state.filters.status && p.status !== state.filters.status) return false;
        if (state.filters.member) {
          var hasMember = false;
          ['plan','design','front','back','qa'].forEach(function(ph) {
            if (p.assignments && p.assignments[ph] && p.assignments[ph].includes(state.filters.member)) hasMember = true;
          });
          if (!hasMember) return false;
        }
        // 스케줄탭: 완료/Deprecated 프로젝트는 상태필터로 명시적으로 선택하지 않으면 숨김
        if (state.currentTab === 'schedule' && !state.filters.status) {
          if (p.status === '완료' || p.status === 'Deprecated') return false;
        }
        return true;
      });
    }

    /* ========== DRAG HANDLING ========== */
    /* ========== UNDO / REDO ========== */
    const undoStack = [];
    const redoStack = [];
    const MAX_UNDO = 20;

    /* ========== SCORE CALC ========== */
    function _recalcScore() {
      const impact = parseInt(document.getElementById('detailImpact').value) || 0;
      const urgency = parseInt(document.getElementById('detailUrgency').value) || 0;
      const complexity = parseInt(document.getElementById('detailComplexity').value) || 0;
      const dependency = parseInt(document.getElementById('detailDependency').value) || 0;
      document.getElementById('detailImpactVal').textContent = impact;
      document.getElementById('detailUrgencyVal').textContent = urgency;
      document.getElementById('detailComplexityVal').textContent = complexity;
      document.getElementById('detailDependencyVal').textContent = dependency;
      const score = Math.round(((impact + urgency + dependency) / 3 - complexity * 0.1) * 10) / 10;
      document.getElementById('detailScoreDisplay').textContent = score;
    }

    function pushUndo() {
      undoStack.push(JSON.stringify(state.projects));
      if (undoStack.length > MAX_UNDO) undoStack.shift();
      redoStack.length = 0;
    }

    function undo() {
      if (undoStack.length === 0) return;
      redoStack.push(JSON.stringify(state.projects));
      state.projects = JSON.parse(undoStack.pop());
      saveProjects();
      rerenderCurrentTab();
      _showToast('되돌리기 완료');
    }

    function redo() {
      if (redoStack.length === 0) return;
      undoStack.push(JSON.stringify(state.projects));
      state.projects = JSON.parse(redoStack.pop());
      saveProjects();
      rerenderCurrentTab();
      _showToast('다시 실행 완료');
    }

    function rerenderCurrentTab() {
      if (state.currentTab === 'schedule') renderGantt();
      else if (state.currentTab === 'projects') renderProjects();
      else if (state.currentTab === 'team') renderTeam();
      else if (state.currentTab === 'overview') renderOverview();
            else if (state.currentTab === 'history') renderHistory();
    }

    function _showToast(msg) {
      let toast = document.getElementById('_toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = '_toast';
        toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2937;color:white;padding:8px 20px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.opacity = '1';
      setTimeout(() => { toast.style.opacity = '0'; }, 1800);
    }

    /* ========== CSV EXPORT ========== */
    function exportCSV() {
      const BOM = '\uFEFF';
      const headers = ['ID','안건명','티어','상태','기획시작','기획종료','디자인시작','디자인종료','FE시작','FE종료','BE시작','BE종료','QA시작','QA종료','배포일','담당자','메모'];
      const rows = state.projects.map(p => {
        const ph = p.phases || {};
        const allMembers = new Set();
        if (p.assignments) Object.values(p.assignments).forEach(a => (a||[]).forEach(m => allMembers.add(m)));
        const names = [...allMembers].map(id => { const t = TEAM.find(m => m.id === id); return t ? t.name : id; }).join('/');
        return [
          p.id, '"' + (p.name||'').replace(/"/g,'""') + '"', p.tier, p.status,
          (ph.plan||{}).start||'', (ph.plan||{}).end||'',
          (ph.design||{}).start||'', (ph.design||{}).end||'',
          (ph.front||{}).start||'', (ph.front||{}).end||'',
          (ph.back||{}).start||'', (ph.back||{}).end||'',
          (ph.qa||{}).start||'', (ph.qa||{}).end||'',
          p.deployDate||'', names,
          '"' + (p.memo||'').replace(/"/g,'""') + '"'
        ].join(',');
      });
      const csv = BOM + headers.join(',') + '\n' + rows.join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'AF_Schedule_' + new Date().toISOString().slice(0,10) + '.csv';
      a.click();
      URL.revokeObjectURL(url);
      _showToast('CSV 내보내기 완료');

    function startDrag(e, projectId, phase) {
      pushUndo(); // 드래그 전 상태 저장
      const bar = e.target.closest('.gantt-bar');
      if (!bar) return;

      const isTouch = e.type === 'touchstart';
      const startX = isTouch ? e.touches[0].clientX : e.clientX;
      let isDragging = false;
      const DRAG_THRESHOLD = isTouch ? 10 : 5;

      const project = state.projects.find(p => p.id === projectId);
      if (!project) return;
      const phaseData = project.phases[phase];
      if (!phaseData || !phaseData.start || !phaseData.end) return;

      const origStart = phaseData.start;
      const origEnd = phaseData.end;

      // 드래그 날짜 라벨
      let dragLabel = document.getElementById('_dragDateLabel');
      if (!dragLabel) {
        dragLabel = document.createElement('div');
        dragLabel.id = '_dragDateLabel';
        dragLabel.className = 'drag-date-label';
        dragLabel.style.display = 'none';
        document.body.appendChild(dragLabel);
      }

      const onMove = (ev) => {
        const clientX = isTouch ? ev.touches[0].clientX : ev.clientX;
        const clientY = isTouch ? ev.touches[0].clientY : ev.clientY;
        const delta = clientX - startX;
        if (!isDragging && Math.abs(delta) < DRAG_THRESHOLD) return;
        isDragging = true;
        if (isTouch) ev.preventDefault();

        const deltaDays = Math.round(delta / (DAY_WIDTH * state.zoom));
        if (deltaDays === 0) return;

        const oldStart = parseLocalDate(origStart);
        const oldEnd = parseLocalDate(origEnd);
        const newStart = new Date(oldStart);
        const newEnd = new Date(oldEnd);
        newStart.setDate(newStart.getDate() + deltaDays);
        newEnd.setDate(newEnd.getDate() + deltaDays);
        phaseData.start = formatDate(newStart);
        phaseData.end = formatDate(newEnd);

        // 날짜 피드백 표시
        dragLabel.textContent = phaseData.start + ' → ' + phaseData.end;
        dragLabel.style.display = 'block';
        dragLabel.style.left = (clientX + 12) + 'px';
        dragLabel.style.top = (clientY - 28) + 'px';

        renderGantt();
      };

      const onUp = () => {
        document.removeEventListener(isTouch ? 'touchmove' : 'mousemove', onMove);
        document.removeEventListener(isTouch ? 'touchend' : 'mouseup', onUp);
        dragLabel.style.display = 'none';
        if (isDragging) {
          saveProjects();
        } else {
          openEditModal(projectId, phase);
        }
      };

      document.addEventListener(isTouch ? 'touchmove' : 'mousemove', onMove, { passive: false });
      document.addEventListener(isTouch ? 'touchend' : 'mouseup', onUp);
    }

    function saveDetail() {
      pushUndo();
      if (!state.selectedProject) return;
      state.selectedProject.name = document.getElementById('detailName').value;
      // 인라인 편집 필드 우선, 없으면 하단 편집 필드
      state.selectedProject.desc = (document.getElementById('detailDescInline') || document.getElementById('detailDesc')).value;
      state.selectedProject.rationale = (document.getElementById('detailRationaleInline') || document.getElementById('detailRationale')).value;
      state.selectedProject.tier = document.getElementById('detailTier').value;
      state.selectedProject.deployDate = document.getElementById('detailDeployDate').value;
      state.selectedProject.status = document.getElementById('detailStatus').value;
      // 점수 필드
      const impactEl = document.getElementById('detailImpact');
      if (impactEl) {
        state.selectedProject.impact = parseInt(impactEl.value) || 0;
        state.selectedProject.urgency = parseInt(document.getElementById('detailUrgency').value) || 0;
        state.selectedProject.complexity = parseInt(document.getElementById('detailComplexity').value) || 0;
        state.selectedProject.dependency = parseInt(document.getElementById('detailDependency').value) || 0;
        state.selectedProject.score = Math.round(((state.selectedProject.impact + state.selectedProject.urgency + state.selectedProject.dependency) / 3 - state.selectedProject.complexity * 0.1) * 10) / 10;
      }
      state.selectedProject.memo = document.getElementById('detailMemo') ? document.getElementById('detailMemo').value : (state.selectedProject.memo || '');
      // Save links
      const linkTypes = document.querySelectorAll('.link-type-select');
      const linkUrls = document.querySelectorAll('.link-url-input');
      state.selectedProject.links = [];
      linkTypes.forEach((sel, i) => {
        const url = linkUrls[i].value.trim();
        if (url) {
          let type = sel.value;
          if (type === '__custom__') {
            const customInput = sel.parentElement.querySelector('.link-custom-type');
            type = customInput ? customInput.value.trim() || '기타' : '기타';
          }
          state.selectedProject.links.push({ type, url });
        }
      });
      pushHistory('edit', state.selectedProject.id, '링크', null, state.selectedProject.links.length + '개');
      // Save service types (already updated via addServiceTag/removeServiceTag)
      saveProjects();
      _showToast('저장되었습니다');
      renderGantt();
      if (state.currentTab === 'projects') renderProjects();
    }

    function addLink() {
      if (!state.selectedProject) return;
      if (!state.selectedProject.links) state.selectedProject.links = [];
      // Save current input values before re-render
      const linkTypes = document.querySelectorAll('.link-type-select');

    // ===== 서비스 종류 체크박스 멀티셀렉트 =====
    function _renderServiceCheckboxes(containerId, project) {
      var container = document.getElementById(containerId);
      if (!container || !project) return;
      var allTypes = _getServiceTypes();
      var selected = project.serviceTypes || [];
      container.innerHTML = '';
      allTypes.forEach(function(st) {
        var checked = selected.includes(st);
        var label = document.createElement('label');
        label.style.cssText = 'display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1.5px solid ' + (checked ? '#2563eb' : '#d1d5db') + ';background:' + (checked ? '#eff6ff' : '#fff') + ';color:' + (checked ? '#1d4ed8' : '#6b7280') + ';font-weight:' + (checked ? '600' : '400') + ';transition:all 0.15s;user-select:none;';
        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = checked;
        cb.style.cssText = 'accent-color:#2563eb;margin:0;cursor:pointer;';
        cb.onchange = function() {
          if (!project.serviceTypes) project.serviceTypes = [];
          if (cb.checked) {
            if (!project.serviceTypes.includes(st)) project.serviceTypes.push(st);
          } else {
            project.serviceTypes = project.serviceTypes.filter(function(s) { return s !== st; });
          }
          _renderServiceCheckboxes(containerId, project);
          // 상세패널 상단 태그도 업데이트
          var display = document.getElementById('detailServiceDisplay');
          if (display) {
            display.innerHTML = (project.serviceTypes || []).map(function(s) { return serviceTagHTML(s, '10px'); }).join('') || '<span style="font-size:11px;color:#bbb;font-style:italic;">서비스 종류 미설정</span>';
          }
        };
        label.appendChild(cb);
        label.appendChild(document.createTextNode(st));
        container.appendChild(label);
      });
    }

    // ===== 서비스 종류 관리 모달 (관리자 전용) =====
    function openServiceTypeManagement() {
      var existing = document.getElementById('serviceTypeMgmtOverlay');
      if (existing) existing.remove();

      var overlay = document.createElement('div');
      overlay.id = 'serviceTypeMgmtOverlay';
      overlay.className = 'modal-overlay show';
      var modal = document.createElement('div');
      modal.style.cssText = 'background:white;border-radius:12px;padding:24px;max-width:460px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);';

      function render() {
        var types = _getServiceTypes();
        var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">' +
          '<h3 style="font-size:16px;font-weight:700;margin:0;">서비스 종류 관리</h3>' +
          '<button onclick="document.getElementById(\'serviceTypeMgmtOverlay\').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#6b7280;line-height:1;">×</button>' +
          '</div>';
        html += '<div style="display:flex;gap:6px;margin-bottom:16px;">' +
          '<input type="text" id="newServiceTypeInput" placeholder="새 서비스 종류 입력..." style="flex:1;padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;">' +
          '<button onclick="_addServiceTypeFromModal()" class="btn" style="font-size:12px;padding:8px 16px;flex-shrink:0;">추가</button>' +
          '</div>';
        html += '<div style="display:flex;flex-direction:column;gap:4px;">';
        types.forEach(function(t, idx) {
          // 기본 타입인지 확인
          var isDefault = SERVICE_TYPES.includes(t);
          html += '<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f9fafb;border-radius:6px;border:1px solid #e5e7eb;">' +
            '<span class="service-tag" style="font-size:11px;padding:3px 8px;">' + t + '</span>' +
            '<span style="font-size:10px;color:#9ca3af;margin-left:auto;">' + (isDefault ? '기본' : '커스텀') + '</span>' +
            '<button onclick="_renameServiceType(' + idx + ')" style="background:none;border:none;color:#2563eb;cursor:pointer;font-size:11px;padding:2px 4px;">이름변경</button>' +
            '<button onclick="_deleteServiceType(' + idx + ')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;padding:2px 4px;" title="삭제">×</button>' +
            '</div>';
        });
        html += '</div>';
        html += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid #e5e7eb;font-size:11px;color:#9ca3af;">삭제 시 기존 프로젝트의 태그는 유지되지만 새로 선택할 수 없게 됩니다.</div>';
        modal.innerHTML = html;
      }
      render();
      overlay.appendChild(modal);
      overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
      document.body.appendChild(overlay);

      // Expose inner functions
      window._addServiceTypeFromModal = function() {
        var input = document.getElementById('newServiceTypeInput');
        var val = input.value.trim();
        if (!val) return;
        var types = _getServiceTypes();
        if (types.includes(val)) { alert('이미 존재하는 서비스 종류입니다.'); return; }
        types.push(val);
        _saveServiceTypes(types);
        render();
        input.value = '';
      };
      window._deleteServiceType = function(idx) {
        var types = _getServiceTypes();
        var name = types[idx];
        if (!confirm('"' + name + '" 서비스 종류를 삭제하시겠습니까?')) return;
        types.splice(idx, 1);
        _saveServiceTypes(types);
        render();
      };
      window._renameServiceType = function(idx) {
        var types = _getServiceTypes();
        var oldName = types[idx];
        var newName = prompt('새 이름:', oldName);
        if (!newName || newName.trim() === '' || newName.trim() === oldName) return;
        newName = newName.trim();
        // Update in all projects too
        state.projects.forEach(function(p) {
          if (p.serviceTypes) {
            var i = p.serviceTypes.indexOf(oldName);
            if (i >= 0) p.serviceTypes[i] = newName;
          }
        });
        types[idx] = newName;
        _saveServiceTypes(types);
        saveProjects();
        render();
        _showToast('"' + oldName + '" → "' + newName + '" 변경 완료');
      };
    }

    function deleteProject() {
      if (!state.selectedProject) return;
      if (!confirm(`${state.selectedProject.name}을 삭제하시겠습니까?`)) return;
      state.projects = state.projects.filter(p => p.id !== state.selectedProject.id);
      saveProjects();
      closeDetailPanel();
      renderGantt();
    }

    function openEditModal(projectId, phase) {
      const project = state.projects.find(p => p.id === projectId);
      if (!project) return;

      state.editingPhase = { projectId, phase };

      const modal = document.getElementById('editModal');
      const phaseData = project.phases[phase] || { start: '', end: '' };
      const currentAssignees = project.assignments[phase] || [];

      document.getElementById('editModalTitle').textContent = `${project.id} ${project.name} - ${PHASE_LABELS[phase]}`;
      document.getElementById('editStartDate').value = phaseData.start || '';
      document.getElementById('editEndDate').value = phaseData.end || '';

      const listEl = document.getElementById('editAssigneeList');
      listEl.innerHTML = '';
      TEAM.forEach(m => {
        const checked = currentAssignees.includes(m.id) ? 'checked' : '';
        listEl.innerHTML += `
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" class="edit-assignee-cb" value="${m.id}" ${checked}>
            <span style="display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: ${m.color};"></span>
            ${m.name} <span style="color: #9ca3af;">(${m.role})</span>
          </label>`;
      });

      modal.classList.add('show');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('show');
      state.editingPhase = null;
    }

    function saveEdit() {
      pushUndo();
      if (!state.editingPhase) return;
      const { projectId, phase } = state.editingPhase;
      const project = state.projects.find(p => p.id === projectId);
      if (!project) return;

      if (!project.phases[phase]) project.phases[phase] = {};
      project.phases[phase].start = document.getElementById('editStartDate').value;
      project.phases[phase].end = document.getElementById('editEndDate').value;

      const checkedBoxes = document.querySelectorAll('.edit-assignee-cb:checked');
      project.assignments[phase] = Array.from(checkedBoxes).map(cb => cb.value);

      saveProjects();
      closeEditModal();
      renderGantt();
      if (state.currentTab === 'projects') renderProjects();
    }

    /* ========== INLINE SCHEDULE ========== */
    let _inlineState = { projectId: null, phase: null };

    function openInlineSchedule(projectId, clickDate, evt) {
      const project = state.projects.find(p => p.id === projectId);
      if (!project) return;
      _inlineState.projectId = projectId;
      _inlineState.phase = null;

      const popup = document.getElementById('inlineSchedulePopup');
      document.getElementById('inlinePopupTitle').textContent = project.name + ' - 스케줄 등록';

      // 페이즈 선택 버튼 (이미 등록된 건 비활성)
      const phases = ['plan', 'design', 'front', 'back', 'qa'];
      const btnContainer = document.getElementById('inlinePhaseButtons');
      btnContainer.innerHTML = '';
      phases.forEach(ph => {
        const hasSchedule = project.phases[ph] && project.phases[ph].start && project.phases[ph].end;
        const btn = document.createElement('button');
        btn.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 12px;border:2px solid ' + PHASE_COLORS[ph] + ';border-radius:6px;background:white;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.15s;';
        if (hasSchedule) {
          btn.style.opacity = '0.4';
          btn.style.cursor = 'default';
          btn.innerHTML = '<span style="width:10px;height:10px;border-radius:50%;background:' + PHASE_COLORS[ph] + ';"></span>' + PHASE_LABELS[ph] + ' <span style="font-size:11px;color:#9ca3af;font-weight:400;">(등록됨)</span>';
        } else {
          btn.innerHTML = '<span style="width:10px;height:10px;border-radius:50%;background:' + PHASE_COLORS[ph] + ';"></span>' + PHASE_LABELS[ph];
          btn.onmouseover = function() { this.style.background = PHASE_COLORS[ph]; this.style.color = 'white'; };
          btn.onmouseout = function() { if (_inlineState.phase !== ph) { this.style.background = 'white'; this.style.color = '#1f2937'; } };
          btn.onclick = function() {
            _inlineState.phase = ph;
            btnContainer.querySelectorAll('button').forEach(b => { b.style.background = 'white'; b.style.color = '#1f2937'; });
            this.style.background = PHASE_COLORS[ph];
            this.style.color = 'white';
          };
        }
        btnContainer.appendChild(btn);
      });

      // 날짜 기본값
      const fd = formatDate(clickDate);
      const endDate = new Date(clickDate);
      endDate.setDate(endDate.getDate() + 13);
      document.getElementById('inlineStartDate').value = fd;
      document.getElementById('inlineEndDate').value = formatDate(endDate);

      // 담당자 체크박스
      const listEl = document.getElementById('inlineAssigneeList');
      listEl.innerHTML = '';
      TEAM.forEach(m => {
        listEl.innerHTML += '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;"><input type="checkbox" class="inline-assignee-cb" value="' + m.id + '"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + m.color + ';"></span>' + m.name + ' <span style="color:#9ca3af;">(' + m.role + ')</span></label>';
      });

      // 위치 - use evt parameter if provided, fallback to window.event
      const clickEvt = evt || window.event;
      popup.style.display = 'block';
      popup.style.left = Math.min(clickEvt.clientX, window.innerWidth - 300) + 'px';
      popup.style.top = Math.min(clickEvt.clientY, window.innerHeight - 400) + 'px';

      // 외부 클릭으로 닫기
      setTimeout(function() {
        document.addEventListener('mousedown', _closeInlineOnOutside);
      }, 100);
    }

    function _closeInlineOnOutside(e) {
      const popup = document.getElementById('inlineSchedulePopup');
      if (!popup.contains(e.target)) closeInlineSchedule();
    }

    function closeInlineSchedule() {
      document.getElementById('inlineSchedulePopup').style.display = 'none';
      _inlineState = { projectId: null, phase: null };
      document.removeEventListener('mousedown', _closeInlineOnOutside);
    }

    function saveInlineSchedule() {
      if (!_inlineState.projectId || !_inlineState.phase) {
        _showToast('페이즈를 선택해주세요');
        return;
      }
      const project = state.projects.find(p => p.id === _inlineState.projectId);
      if (!project) return;

      pushUndo();
      const startVal = document.getElementById('inlineStartDate').value;
      const endVal = document.getElementById('inlineEndDate').value;
      if (!startVal || !endVal) { _showToast('날짜를 입력해주세요'); return; }

      if (!project.phases[_inlineState.phase]) project.phases[_inlineState.phase] = {};
      project.phases[_inlineState.phase].start = startVal;
      project.phases[_inlineState.phase].end = endVal;

      const checkedBoxes = document.querySelectorAll('.inline-assignee-cb:checked');
      project.assignments[_inlineState.phase] = Array.from(checkedBoxes).map(cb => cb.value);

      saveProjects();
      closeInlineSchedule();
      renderGantt();
      if (state.currentTab === 'projects') renderProjects();
      _showToast(PHASE_LABELS[_inlineState.phase] + ' 스케줄이 등록되었습니다');
    }

    // 프로젝트 정렬 상태
    let _projectSortKey = 'deadline';
    function sortProjects(key) {
      _projectSortKey = key;
      renderProjects();
    }

    function getSortedProjects(projects) {
      const tierRank = { CRITICAL: 0, TIER1: 1, TIER2: 2, TIER3: 3, TIER4: 4, CONTINUOUS: 5 };
      const statusRank = { '진행': 0, '대기': 1, '연기': 2, '완료': 3, 'Deprecated': 4 };
      const sorted = projects.slice();
      sorted.sort(function(a, b) {
        switch (_projectSortKey) {
          case 'tier': return (tierRank[a.tier] || 99) - (tierRank[b.tier] || 99);
          case 'name': return a.name.localeCompare(b.name, 'ko');
          case 'score': return (b.bizScore || 0) - (a.bizScore || 0);
          case 'status': return (statusRank[a.status] || 99) - (statusRank[b.status] || 99);
          case 'deploy': {
            const da = a.deployDate ? parseLocalDate(a.deployDate) : null;
            const db = b.deployDate ? parseLocalDate(b.deployDate) : null;
            if (!da && !db) return 0;
            if (!da) return 1;
            if (!db) return -1;
            return da - db;
          }
          case 'deadline': {
            // 가장 빠른 종료일 기준
            function getEarliestEnd(p) {
              var earliest = null;
              ['plan','design','front','back','qa'].forEach(function(ph) {
                if (p.phases[ph] && p.phases[ph].end) {
                  var d = parseLocalDate(p.phases[ph].end);
                  if (d && d >= TODAY && (!earliest || d < earliest)) earliest = d;
                }
              });
              return earliest;
            }
            var ea = getEarliestEnd(a), eb = getEarliestEnd(b);
            if (!ea && !eb) return 0;
            if (!ea) return 1;
            if (!eb) return -1;
            return ea - eb;
          }
          default: return 0;
        }
      });
      return sorted;
    }

    function renderProjects() {
      const tbody = document.getElementById('projectsTable');
      tbody.innerHTML = '';

      getSortedProjects(filterProjects()).forEach((p, idx) => {
        const gmvBadge = p.gmvImpact ? `<span class="gmv-badge">${p.gmvImpact}</span>` : '<span style="color:#bbb;font-size:12px;">-</span>';
        const row = `
          <tr>
            <td>${idx + 1}</td>
            <td><span class="tier-badge tier-${p.tier}">${p.tier === 'CONTINUOUS' ? '지속' : p.tier}</span></td>
            <td><span class="project-name-link" onclick="openDetailPanel('${p.id}')">${p.name}</span>${(p.serviceTypes||[]).map(function(st){return ' '+serviceTagHTML(st);}).join('')}</td>
            <td class="phase-cell" onclick="openEditModal('${p.id}','plan')">${renderPhaseCell(p, 'plan')}</td>
            <td class="phase-cell" onclick="openEditModal('${p.id}','design')">${renderPhaseCell(p, 'design')}</td>
            <td class="phase-cell" onclick="openEditModal('${p.id}','front')">${renderPhaseCell(p, 'front')}</td>
            <td class="phase-cell" onclick="openEditModal('${p.id}','back')">${renderPhaseCell(p, 'back')}</td>
            <td class="phase-cell" onclick="openEditModal('${p.id}','qa')">${renderPhaseCell(p, 'qa')}</td>
            <td style="text-align:center;">${gmvBadge}</td>
            <td class="phase-cell" onclick="editDeployDate('${p.id}', this)">${p.deployDate || '<span style="color:#bbb;">+ 설정</span>'}</td>
            <td class="phase-cell" onclick="editStatus('${p.id}', this)">${p.status}</td>
          </tr>
        `;
        tbody.innerHTML += row;
      });
    }

    function renderPhaseCell(project, phase) {
      const phaseData = project.phases[phase];
      const assignees = (project.assignments[phase] || []).map(id => {
        const m = getTeamMember(id);
        return m ? m.name.charAt(0) + m.name.charAt(m.name.length - 1) : id;
      }).join(' ');
      if (!phaseData || !phaseData.start) {
        return `<span style="color: #bbb; font-size: 12px;">+ 등록</span>`;
      }
      const start = phaseData.start.slice(5);
      const end = phaseData.end.slice(5);
      return `<div style="font-size: 12px; line-height: 1.4;"><div style="font-weight: 500;">${assignees || '-'}</div><div style="color: #6b7280;">${start}~${end}</div></div>`;
    }

    function renderTeam() {
      const container = document.getElementById('teamCards');
      container.innerHTML = '';

      TEAM.forEach(member => {
        const assigned = state.projects
          .flatMap(p => ['plan', 'design', 'front', 'back', 'qa'].map(ph => ({
            project: p,
            phase: ph,
            data: p.phases[ph]
          })))
          .filter(item => item.data && item.data.start && item.project.assignments[item.phase] && item.project.assignments[item.phase].includes(member.id));

        // 주간 동시 작업 수 계산 (7일 단위)
        const weekTasks = {};
        assigned.forEach(item => {
          const start = parseLocalDate(item.data.start);
          const end = parseLocalDate(item.data.end);
          const sw = Math.floor(daysSinceStart(start) / 7);
          const ew = Math.floor(daysSinceStart(end) / 7);
          for (let w = sw; w <= ew; w++) {
            weekTasks[w] = (weekTasks[w] || 0) + 1;
          }
        });
        const maxConcurrent = Math.max(...Object.values(weekTasks), 0);
        // 정상: 동시 1~2개, 과부하: 3개 이상
        const loadColor = maxConcurrent >= 3 ? '#dc2626' : maxConcurrent >= 2 ? '#f59e0b' : '#10b981';
        const loadLabel = maxConcurrent >= 3 ? '과부하' : maxConcurrent >= 2 ? '보통' : '여유';

        // 프로젝트별 그룹 (중복 제거)
        const projectSet = new Map();
        assigned.forEach(item => {
          if (!projectSet.has(item.project.id)) {
            projectSet.set(item.project.id, { project: item.project, phases: [] });
          }
          projectSet.get(item.project.id).phases.push(item.phase);
        });

        // 미니 간트 (높이 키우기, 줄 분리)
        let miniGanttHTML = '<div style="position:relative;height:' + (Math.max(assigned.length, 1) * 10 + 4) + 'px;background:#f9fafb;border-radius:4px;overflow:hidden;">';
        // today 마커
        const todayPct = (daysSinceStart(TODAY) / TOTAL_DAYS) * 100;
        miniGanttHTML += '<div style="position:absolute;left:' + todayPct + '%;top:0;bottom:0;width:1px;background:#ef4444;z-index:1;"></div>';
        assigned.forEach((item, idx) => {
          const start = daysSinceStart(parseLocalDate(item.data.start));
          const duration = durationDays(parseLocalDate(item.data.start), parseLocalDate(item.data.end));
          const left = (start / TOTAL_DAYS) * 100;
          const width = Math.max((duration / TOTAL_DAYS) * 100, 0.5);
          miniGanttHTML += '<div style="position:absolute;left:' + left + '%;width:' + width + '%;height:7px;top:' + (2 + idx * 10) + 'px;background:' + PHASE_COLORS[item.phase] + ';border-radius:2px;opacity:0.85;" title="' + item.project.id + ' ' + PHASE_LABELS[item.phase] + '"></div>';
        });
        miniGanttHTML += '</div>';

        // 할당 프로젝트 목록
        let projectListHTML = '';
        projectSet.forEach((val, pid) => {
          const tierColor = TIER_COLORS[val.project.tier] || '#6b7280';
          const phaseChips = val.phases.map(ph => '<span style="font-size:9px;padding:1px 4px;border-radius:2px;background:' + PHASE_COLORS[ph] + ';color:white;">' + PHASE_SHORT[ph] + '</span>').join(' ');
          projectListHTML += '<div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid #f3f4f6;cursor:pointer;" onclick="openDetailPanel(\'' + pid + '\')">' +
            '<span style="font-size:9px;font-weight:700;color:' + tierColor + ';">' + pid + '</span>' +
            '<span style="font-size:11px;color:#374151;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + val.project.name + '</span>' +
            phaseChips + '</div>';
        });

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <div style="width:36px;height:36px;border-radius:50%;background:${member.color};display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;">${member.name[0]}</div>
            <div>
              <div style="font-weight:700;font-size:14px;color:#1f2937;">${member.name}</div>
              <div style="font-size:11px;color:#9ca3af;">${member.role}</div>
            </div>
            <div style="margin-left:auto;text-align:right;">
              <div style="font-size:20px;font-weight:800;color:${loadColor};">${maxConcurrent}</div>
              <div style="font-size:9px;color:${loadColor};font-weight:600;">${loadLabel} · ${assigned.length}건</div>
            </div>
          </div>
          <div style="margin-bottom:10px;">${miniGanttHTML}</div>
          <div style="max-height:160px;overflow-y:auto;">${projectListHTML || '<div style="font-size:11px;color:#9ca3af;padding:8px 0;">할당된 안건 없음</div>'}</div>
        `;
        container.appendChild(card);
      });
    }

    function renderHistory() {
      const container = document.getElementById('historyContent');
      if (!container) return;
      const hist = (state.history || []).slice().reverse();
      if (hist.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#9ca3af;padding:60px 0;">변경 이력이 없습니다.</div>';
        return;
      }
      const ACTION_ICONS = { create: '➕', edit: '✏️', delete: '🗑️', status: '🔄' };
      const ACTION_LABELS = { create: '생성', edit: '수정', delete: '삭제', status: '상태변경' };
      container.innerHTML = hist.map(h => {
        const icon = ACTION_ICONS[h.action] || '📝';
        const label = ACTION_LABELS[h.action] || h.action;
        const dt = new Date(h.timestamp);
        const timeStr = dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0') + ' ' + String(dt.getHours()).padStart(2,'0') + ':' + String(dt.getMinutes()).padStart(2,'0');
        let detail = '';
        if (h.field) detail += '<span style="color:#6366f1;font-weight:600;">' + h.field + '</span> ';
        if (h.oldVal !== undefined && h.oldVal !== null) detail += '<span style="color:#ef4444;text-decoration:line-through;">' + String(h.oldVal).substring(0,50) + '</span> → ';
        if (h.newVal !== undefined && h.newVal !== null) detail += '<span style="color:#10b981;">' + String(h.newVal).substring(0,50) + '</span>';
        return '<div style="display:flex;gap:12px;padding:12px 16px;background:white;border-radius:8px;border:1px solid #e5e7eb;align-items:flex-start;">' +
          '<div style="font-size:20px;flex-shrink:0;">' + icon + '</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="display:flex;gap:8px;align-items:center;margin-bottom:4px;">' +
              '<span style="font-weight:600;font-size:13px;">[' + label + ']</span>' +
              '<span style="font-weight:600;font-size:13px;">' + (h.projectId || '') + ' ' + (h.projectName || '') + '</span>' +
            '</div>' +

    function renderOverview() {
      const all = state.projects;
      const inProgress = all.filter(p => p.status === '진행').length;
      const completed = all.filter(p => p.status === '완료').length;
      const waiting = all.filter(p => p.status === '대기').length;
      const p26 = all.find(p => p.id === 'P26');
      const daysLeft = p26 ? Math.ceil((parseLocalDate('2026-08-15') - TODAY) / 86400000) : 0;

      // 티어별 집계
      const tierCounts = {};
      ['CRITICAL','TIER1','TIER2','TIER3','TIER4','CONTINUOUS'].forEach(t => {
        tierCounts[t] = all.filter(p => p.tier === t).length;
      });

      // 이번 주 / 다음 주 착수 예정
      const thisWeek = [], nextWeek = [];
      all.forEach(p => {
        ['plan','design','front','back','qa'].forEach(ph => {
          if (p.phases[ph] && p.phases[ph].start) {
            const d = daysSinceStart(parseLocalDate(p.phases[ph].start));
            if (d >= 0 && d <= 7) thisWeek.push({ p, ph });
            else if (d > 7 && d <= 14) nextWeek.push({ p, ph });
          }
        });
      });

      // 팀원별 워크로드 바 차트
      let memberBarsHTML = '';

        const count = all.filter(p =>
          ['plan','design','front','back','qa'].some(ph => p.assignments[ph] && p.assignments[ph].includes(m.id))
        ).length;
        const pct = Math.round((count / Math.max(all.length, 1)) * 100);
        const barColor = count >= 8 ? '#dc2626' : count >= 5 ? '#f59e0b' : '#10b981';
        memberBarsHTML += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">' +
          '<div style="width:56px;font-size:11px;color:#6b7280;text-align:right;">' + m.name + '</div>' +
          '<div style="flex:1;height:16px;background:#f3f4f6;border-radius:3px;overflow:hidden;position:relative;">' +
          '<div style="width:' + Math.min(pct * 2.5, 100) + '%;height:100%;background:' + barColor + ';border-radius:3px;"></div>' +
          '</div>' +
          '<div style="width:28px;font-size:12px;font-weight:700;color:' + barColor + ';">' + count + '</div></div>';

            <div style="font-size:11px;color:#9ca3af;margin-bottom:4px;">대기 / 진행 / 완료</div>
            <div style="font-size:18px;font-weight:700;"><span style="color:#6b7280;">${waiting}</span> / <span style="color:#f59e0b;">${inProgress}</span> / <span style="color:#10b981;">${completed}</span></div>

    function editDeployDate(projectId, td) {
      const project = state.projects.find(p => p.id === projectId);
      if (!project) return;
      const input = document.createElement('input');
      input.type = 'date';
      input.value = project.deployDate || '';
      input.style.cssText = 'width:100%; font-size:13px; padding:4px; border:1px solid #6366f1; border-radius:4px;';
      td.innerHTML = '';
      td.appendChild(input);
      input.focus();

      const save = () => {
        project.deployDate = input.value;
        saveProjects();
        renderProjects();
        renderGantt();
      };
      input.onblur = save;
      input.onkeydown = (e) => { if (e.key === 'Enter') save(); if (e.key === 'Escape') renderProjects(); };
    }

    function editStatus(projectId, td) {
      const project = state.projects.find(p => p.id === projectId);
      if (!project) return;
      const sel = document.createElement('select');
      sel.style.cssText = 'width:100%; font-size:13px; padding:4px; border:1px solid #6366f1; border-radius:4px;';
      ['대기', '진행', '완료'].forEach(s => {
        const opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        if (project.status === s) opt.selected = true;
        sel.appendChild(opt);
      });
      td.innerHTML = '';
      td.appendChild(sel);
      sel.focus();

      const save = () => {
        project.status = sel.value;
        saveProjects();
        renderProjects();
        renderGantt();
      };
      sel.onblur = save;
      sel.onchange = save;
    }

    function _recalcCreateScore() {
      var impact = parseInt(document.getElementById('createImpact').value) || 0;
      var urgency = parseInt(document.getElementById('createUrgency').value) || 0;
      var complexity = parseInt(document.getElementById('createComplexity').value) || 0;
      var dependency = parseInt(document.getElementById('createDependency').value) || 0;
      var score = Math.round(((impact + urgency + dependency) / 3 - complexity * 0.1) * 10) / 10;
      document.getElementById('createScoreDisplay').textContent = score;
    }

    function saveNewProject() {
      if (!state.selectedProject || !state.isCreating) return;
      const name = document.getElementById('detailName').value.trim();
      if (!name) { alert('안건명을 입력하세요'); return; }

      state.selectedProject.name = name;
      state.selectedProject.desc = document.getElementById('detailDesc').value;
      state.selectedProject.tier = document.getElementById('detailTier').value;
      state.selectedProject.deployDate = document.getElementById('detailDeployDate').value;
      state.selectedProject.status = document.getElementById('detailStatus').value;
      state.selectedProject.rationale = document.getElementById('detailRationale').value;
      // 점수 저장
      state.selectedProject.impact = parseInt(document.getElementById('createImpact').value) || 5;
      state.selectedProject.urgency = parseInt(document.getElementById('createUrgency').value) || 5;
      state.selectedProject.complexity = parseInt(document.getElementById('createComplexity').value) || 3;
      state.selectedProject.dependency = parseInt(document.getElementById('createDependency').value) || 0;
      var score = Math.round(((state.selectedProject.impact + state.selectedProject.urgency + state.selectedProject.dependency) / 3 - state.selectedProject.complexity * 0.1) * 10) / 10;
      state.selectedProject.score = score;
      state.selectedProject.bizScore = score;
      // Save links
      const linkTypes = document.querySelectorAll('.link-type-select');
      const linkUrls = document.querySelectorAll('.link-url-input');
      state.selectedProject.links = [];
      linkTypes.forEach((sel, i) => {
        const url = linkUrls[i].value.trim();
        if (url) {
          state.selectedProject.links.push({ type: sel.value, url });
        }
      });

      state.projects.push(state.selectedProject);
      state.isCreating = false;
      saveProjects();
      closeDetailPanel();
      restoreDetailActions();
      renderGantt();
      if (state.currentTab === 'projects') renderProjects();
    }

      const actions = document.querySelector('.detail-actions');
      actions.innerHTML = `
        <button class="btn btn-secondary" onclick="closeDetailPanel()">닫기</button>
        <button class="btn" onclick="saveDetail()">저장</button>
        <button class="btn btn-secondary" style="color: #dc2626;" onclick="deleteProject()">삭제</button>
      `;
    }

    /* ========== INIT ========== */
    function init() {
      // Load history and restore admin mode
      loadHistory();
      if (localStorage.getItem('af_adminMode') === 'true') {
        state.adminMode = true;
        document.getElementById('adminToggle').textContent = '🔓';
        document.getElementById('adminBadge').style.display = 'inline-block';
        document.getElementById('memberMgmtBtn').style.display = 'inline-block';
        document.getElementById('serviceMgmtBtn').style.display = 'inline-block';
        var histBtn = document.getElementById('clearHistoryBtn');
        if (histBtn) histBtn.style.display = 'inline-block';
      }
      // Restore saved team
      const savedTeam = localStorage.getItem('af_team');
      if (savedTeam) {
        try { const t = JSON.parse(savedTeam); if (t.length) { TEAM.length = 0; TEAM.push(...t); } } catch(e) {}
      }

      // 1단계: 즉시 데이터 로드 및 렌더 (Firebase 무관하게 화면 먼저 표시)
      initProjects();

      // 2단계: 렌더 끝난 후 Firebase 비동기 연결 (화면 안 막음)
      setTimeout(_bootFirebase, 300);

      // Tabs
      document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          const tabId = tab.dataset.tab;
          document.getElementById(tabId).classList.add('active');
          state.currentTab = tabId;

          if (tabId === 'projects') renderProjects();
          else if (tabId === 'team') renderTeam();
          else if (tabId === 'overview') renderOverview();
          else renderGantt();
        };
      });

      // View toggle
      document.querySelectorAll('[data-view]').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.view = btn.dataset.view;
          renderGantt();
        };
      });

      // Zoom
      document.getElementById('zoomIn').onclick = () => {
        state.zoom = Math.min(3, state.zoom + 0.25);
        document.getElementById('zoomValue').textContent = Math.round(state.zoom * 100);
        renderGantt();
      };
      document.getElementById('zoomOut').onclick = () => {
        state.zoom = Math.max(0.5, state.zoom - 0.25);
        document.getElementById('zoomValue').textContent = Math.round(state.zoom * 100);
        renderGantt();
      };

      // Filters
      document.getElementById('searchInput').oninput = (e) => {
        state.filters.search = e.target.value;
        if (state.currentTab === 'schedule') renderGantt();
        else if (state.currentTab === 'projects') renderProjects();
      };

      document.getElementById('tierFilter').onchange = (e) => {
        state.filters.tier = e.target.value;
        if (state.currentTab === 'schedule') renderGantt();
        else if (state.currentTab === 'projects') renderProjects();
      };

      document.getElementById('statusFilter').onchange = (e) => {
        state.filters.status = e.target.value;
        if (state.currentTab === 'schedule') renderGantt();
        else if (state.currentTab === 'projects') renderProjects();
      };

      // Member filter
      var mf = document.getElementById('memberFilter');
      mf.innerHTML = '<option value="">전체 멤버</option>';
      TEAM.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.name + ' (' + m.role + ')';
        mf.appendChild(opt);
      });
      mf.onchange = function(e) {
        state.filters.member = e.target.value;
        if (state.currentTab === 'schedule') renderGantt();
        else if (state.currentTab === 'projects') renderProjects();
      };

      // Sync scroll between header and bars (horizontal)
      const ganttScroll = document.getElementById('ganttScroll');
      const ganttHeader = document.querySelector('.gantt-header');
      if (ganttScroll && ganttHeader) {
        ganttScroll.addEventListener('scroll', () => {
          ganttHeader.scrollLeft = ganttScroll.scrollLeft;
        });
      }

      // ESC to close panels/modals
      document.addEventListener('keydown', (e) => {
        // Ctrl+Z: 되돌리기
        if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
        // Ctrl+Y or Ctrl+Shift+Z: 다시실행
        if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }
        // Ctrl+E: CSV 내보내기
        if ((e.ctrlKey || e.metaKey) && e.key === 'e') { e.preventDefault(); exportCSV(); return; }
        // ESC
        if (e.key === 'Escape') {
          // 채팅 패널이 열려있으면 먼저 닫기 (방 내부면 방 리스트로, 아니면 패널 닫기)
          var chatPanel = document.getElementById('chatPanel');
          if (chatPanel && chatPanel.classList.contains('open')) {
            var roomView = document.getElementById('projectRoomView');
            if (roomView && roomView.style.display === 'flex' && state.currentChatTab === 'project') {
              backToRoomList();
            } else {
              toggleChatPanel();
            }
            return;
          }
          const inlinePopup = document.getElementById('inlineSchedulePopup');
          if (inlinePopup && inlinePopup.style.display !== 'none') {
            closeInlineSchedule();
          } else if (document.getElementById('editModal').classList.contains('show')) {
            closeEditModal();
          } else if (document.getElementById('detailPanel').classList.contains('open')) {
            closeDetailPanel();
          }
        }
        // Enter: 인라인 팝업 저장
        if (e.key === 'Enter' && !e.ctrlKey && !e.metaKey) {
          const inlinePopup = document.getElementById('inlineSchedulePopup');
          if (inlinePopup && inlinePopup.style.display !== 'none') {
            e.preventDefault();
            saveInlineSchedule();
          }
        }
      });

      // Initial render
      renderGantt();

      // 오늘 위치로 스크롤 (약간 왼쪽 여유)
      setTimeout(() => {
        const gs = document.getElementById('ganttScroll');
        if (gs) {
          const todayOffset = daysSinceStart(TODAY) * DAY_WIDTH * state.zoom;
          gs.scrollLeft = Math.max(0, todayOffset - 100);
          const gh = document.querySelector('.gantt-header');
          if (gh) gh.scrollLeft = gs.scrollLeft;
        }
      }, 50);
    }

    window.openDetailPanel = openDetailPanel;
    window.closeDetailPanel = closeDetailPanel;
    window.saveDetail = saveDetail;
    window.deleteProject = deleteProject;
    window.openEditModal = openEditModal;
    window.closeEditModal = closeEditModal;
    window.saveEdit = saveEdit;
    window.openInlineSchedule = openInlineSchedule;
    window.closeInlineSchedule = closeInlineSchedule;
    window.saveInlineSchedule = saveInlineSchedule;
    window.createNewProject = createNewProject;
    window.saveNewProject = saveNewProject;
    window.editDeployDate = editDeployDate;
    window.editStatus = editStatus;
    window.addLink = addLink;
    window.removeLink = removeLink;
    window.editLinkInline = editLinkInline;
    window.undo = undo;
    window.redo = redo;
    window.exportCSV = exportCSV;
    window._recalcScore = _recalcScore;
    window.clearHistory = clearHistory;
    window.renderHistory = renderHistory;
    window.openMemberManagement = openMemberManagement;
    window.addNewMember = addNewMember;
    window.removeMember = removeMember;
    window.saveMemberChanges = saveMemberChanges;
    window.toggleAdminMode = toggleAdminMode;
    window.renderAll = renderAll;
    window.loginWithGoogle = loginWithGoogle;
    window.logoutUser = logoutUser;
    window.toggleChatPanel = toggleChatPanel;
    window.switchChatTab = switchChatTab;
    window.switchProject = switchProject;
    window.sendChatMessage = sendChatMessage;
    window.handleMentionInput = handleMentionInput;
    window.handleMentionKey = handleMentionKey;
    window.insertMention = insertMention;
    window.clearChatBadge = clearChatBadge;
    window.sortProjects = sortProjects;
    window.enterRoom = enterRoom;
    window.backToRoomList = backToRoomList;
    window._recalcCreateScore = _recalcCreateScore;
    window.addServiceTag = addServiceTag;
    window.removeServiceTag = removeServiceTag;
    window.addCustomServiceType = addCustomServiceType;
    window.addCreateServiceTag = addCreateServiceTag;
    window.removeCreateServiceTag = removeCreateServiceTag;
    window.addCreateCustomServiceType = addCreateCustomServiceType;
    window.renderDetailServiceTags = renderDetailServiceTags;
    window.renderCreateServiceTags = renderCreateServiceTags;
    window.openServiceTypeManagement = openServiceTypeManagement;

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
